<div class="container mt-5">
    <div class="row">
        
        <div class="col-md-4 mb-4">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
            <h5 class="card-title mb-0">Registrar Nueva Matrícula</h5>
            </div>
            <div class="card-body">
            <form (ngSubmit)="registrarMatricula()" #matriculaForm="ngForm">
                
                <div class="mb-3">
                <label class="form-label fw-bold">Nombre del Estudiante:</label>
                <input type="text" class="form-control" name="nombre" [(ngModel)]="nuevaMatricula.nombreEstudiante" required placeholder="Ej. Juan Pérez">
                </div>

                <div class="mb-3">
                <label class="form-label fw-bold">Código del Estudiante:</label>
                <input type="text" class="form-control" name="codigo" [(ngModel)]="nuevaMatricula.codigoEstudiante" required placeholder="Ej. U20230000">
                </div>

                <div class="mb-3">
                <label class="form-label fw-bold">Turno:</label>
                <select class="form-select" name="turno" [(ngModel)]="nuevaMatricula.turno" required>
                    <option value="" disabled>Seleccione un turno</option>
                    <option value="Mañana">Mañana</option>
                    <option value="Tarde">Tarde</option>
                    <option value="Noche">Noche</option>
                </select>
                </div>

                <div class="mb-4">
                <label class="form-label fw-bold">Curso:</label>
                <select class="form-select" name="curso" [(ngModel)]="cursoSeleccionadoId" required>
                    <option [ngValue]="null" disabled>Seleccione un curso</option>
                    <option *ngFor="let curso of listaCursos" [value]="curso.id">
                    {{ curso.nombre }} ({{ curso.creditos }} crd.)
                    </option>
                </select>
                </div>

                <button type="submit" class="btn btn-primary w-100" [disabled]="!matriculaForm.valid || !cursoSeleccionadoId">
                Matricular
                </button>
            </form>
            </div>
        </div>
        </div>

        <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
            <h5 class="card-title mb-0">Lista de Matriculados</h5>
            </div>
            <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0">
                <thead class="table-light">
                    <tr>
                    <th>ID</th>
                    <th>Estudiante</th>
                    <th>Código</th>
                    <th>Turno</th>
                    <th>Curso</th>
                    <th>Fecha</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let m of listaMatriculas">
                    <td class="align-middle fw-bold">{{ m.id }}</td>
                    <td class="align-middle">{{ m.nombreEstudiante }}</td>
                    <td class="align-middle">{{ m.codigoEstudiante }}</td>
                    <td class="align-middle">
                        <span class="badge bg-info text-dark">{{ m.turno }}</span>
                    </td>
                    <td class="align-middle">{{ m.curso?.nombre || 'Sin curso asignado' }}</td>
                    <td class="align-middle">{{ m.fechaMatricula }}</td>
                    </tr>
                </tbody>
                </table>
            </div>
            
            <div *ngIf="listaMatriculas.length === 0" class="p-4 text-center text-muted">
                <p class="mb-0">No hay matrículas registradas aún.</p>
            </div>
            
            </div>
        </div>
        </div>

    </div>
</div>
